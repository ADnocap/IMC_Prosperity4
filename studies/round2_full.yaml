# Full-scale R2 optimization — six params, 150 trials, portal-final tick budget.
#
# Targets the whole OSMIUM signal + PEPPER tier-1 surface. ~5-7 min on 4 workers.
# Produces:
#   - train/val/test curves that show TPE's explore→exploit transition
#   - fANOVA that actually differentiates params
#   - a cluster check that can "CLUSTERED" (usually does with this surface)
#   - a 2D slice with a visible gradient across any (x, y) pair
#
# Run:
#   prosperity4opt studies/round2_full.yaml --fresh

name: round2_signal_full
trader: studies/round2_tunable.py

sim:
  # One MC subprocess per trial runs 70 sessions; sliced into 50 train + 20 val.
  # Test is deferred to end-of-study retest (100 fresh seeds per top-K trial).
  train_sessions: 50
  val_sessions:   20
  test_sessions:  100
  ticks_per_day:  10000         # portal final-eval scale
  seed:           42             # CRN across trials — low-variance param comparison
  flags:
    intarian-pepper-root-start-fv: 13000

params:
  SIGNAL_MIN_COUNT:  { type: int,   low: 100,  high: 1500, log: true }
  SIGNAL_EDGE_ON:    { type: float, low: 0.08, high: 0.30 }
  SIGNAL_EDGE_OFF:   { type: float, low: 0.02, high: 0.20 }
  ACO_SOFT_POS:      { type: int,   low: 15,   high: 55 }
  IPR_ASK_OFFSET_1:  { type: int,   low: 4,    high: 12 }
  IPR_ASK_THRESH_1:  { type: int,   low: 40,   high: 75 }

constraints:
  # Hysteresis: turn on at the high threshold, turn off at the lower one.
  - "SIGNAL_EDGE_OFF < SIGNAL_EDGE_ON"

objective:
  terms:
    - { name: mean_pnl, weight: 1.0 }
    - { name: cvar_10,  weight: 0.05 }   # light tail-risk penalty (bottom 10%)

search:
  sampler: tpe
  n_trials: 150
  n_jobs:   4
  sampler_options:
    n_startup_trials: 30        # random/LHS-style warmup before TPE kicks in
  seed: 2026

report:
  top_k: 10
